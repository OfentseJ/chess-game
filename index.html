<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Chess App</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="timer.js" defer></script>
    <script src="pieces.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <div class="player-hud">
        <div id="black-timer" class="timer">10:00</div>
        <div id="captured-by-black" class="captured-area"></div>
      </div>

      <div id="gameboard"></div>

      <div class="player-hud">
        <div id="white-timer" class="timer active-timer">10:00</div>
        <div id="captured-by-white" class="captured-area"></div>
      </div>

      <div class="history-container">
        <div id="move-history" class="move-history-box"></div>
      </div>

      <div class="controls-container">
        <button id="undo-btn">Undo</button>
        <button id="flip-btn">Flip Board</button>
        <button id="reset-btn">Reset</button>
        <select id="time-control" class="time-selector">
          <option value="600">Rapid (10 min)</option>
          <option value="300">Blitz (5 min)</option>
          <option value="120">Bullet (2 min)</option>
          <option value="0">None</option>
        </select>
      </div>
    </div>
  </body>
</html>
